
<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Live Stream</title>
    <link rel="stylesheet" href="/shared.css" />
    <style>
      body {
        margin: 0;
        background: #000;
        overflow: hidden;
      }


#container {
  width: 100vw;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #000;
  position: relative;
  overflow: hidden;
}

/* Video frame */
#player {
  border: 0;
  background: #000;
  width: min(100vw, calc(100vh * 16 / 9));
  height: min(100vh, calc(100vw * 9 / 16));
}

/* Fullscreen button stays on top */
#fsBtn {
  position: absolute;
  left: 20px;
  top: 20px;
  width: 55px;
  height: 55px;
  border-radius: 12px;
  background: rgba(255, 255, 255, 0.1);
  backdrop-filter: blur(4px);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: 0.15s, opacity 0.3s ease;
  z-index: 10;
}
      #fsBtn:hover {
        background: rgba(255, 255, 255, 0.2);
      }
      #fsBtn svg {
        width: 55%;
        height: 55%;
        fill: white;
      }
      /* Hidden in fullscreen */
      .fullscreen-hide {
        opacity: 0;
        pointer-events: none;
      }

      /* Shout composer */
      #shoutComposer {
        position: fixed;
        top: 45%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: min(440px, 92vw);
        background: rgba(0, 0, 0, 0.55);
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 10px;
        padding: 8px 10px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
        display: flex;
        flex-direction: column;
        align-items: stretch;
        gap: 6px;
        z-index: 12;
      }
      #shoutComposer.hidden {
        display: none;
      }
      #shoutInput {
        flex: 1;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 8px;
        color: white;
        padding: 8px 10px;
        font-size: 16px;
        outline: none;
        min-width: 0;
      }
      #shoutInput:focus {
        border-color: rgba(255, 255, 255, 0.35);
        background: rgba(255, 255, 255, 0.14);
      }
      #statusMessage {
        position: absolute;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: rgba(0, 0, 0, 0.72);
        z-index: 11;
      }
      #statusMessage.visible {
        display: flex;
      }
      #statusCard {
        min-width: 220px;
        max-width: 24rem;
        padding: 18px 20px 16px;
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        background: rgba(18, 18, 18, 0.94);
        color: #fff;
        text-align: center;
        box-shadow: 0 18px 60px rgba(0, 0, 0, 0.35);
      }
      #statusSpinner {
        width: 28px;
        height: 28px;
        margin: 0 auto 12px;
        border-radius: 999px;
        border: 2px solid rgba(255, 255, 255, 0.18);
        border-top-color: #fff;
        animation: status-spin 0.85s linear infinite;
      }
      #statusMessage.denied #statusSpinner {
        display: none;
      }
      #statusTitle {
        margin: 8px 0 0;
        font-size: 13px;
        color: rgba(255, 255, 255, 0.88);
      }
      @keyframes status-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body tabindex="-1">
    <div id="container">
      <!-- MediaMTX WebRTC player (native video) -->
      <video
        id="player"
        autoplay
        playsinline
        controls
        muted
      ></video>

      <!-- Fullscreen button -->
      <div id="fsBtn" title="Fullscreen">
        <svg viewBox="0 0 23 23">
          <path
            d="M12.5 7C12.5 6.58579 12.8358 6.25 13.25 6.25H17C17.4142 6.25 17.75 6.58579 17.75 7V10.75C17.75 11.1642 17.4142 11.5 17 11.5C16.5858 11.5 16.25 11.1642 16.25 10.75V8.81066L8.81066 16.25H10.75C11.1642 16.25 11.5 16.5858 11.5 17C11.5 17.4142 11.1642 17.75 10.75 17.75H7C6.58579 17.75 6.25 17.4142 6.25 17V13.25C6.25 12.8358 6.58579 12.5 7 12.5C7.41421 12.5 7.75 12.8358 7.75 13.25V15.1893L15.1893 7.75H13.25C12.8358 7.75 12.5 7.41421 12.5 7Z"
          />
        </svg>
      </div>

      <!-- Shout composer (Enter to open, Enter to send) -->
      <div id="shoutComposer" class="hidden">
        <input
          id="shoutInput"
          type="text"
          autocomplete="off"
        />
        <div id="soundPopup" class="sound-popup hidden"></div>
      </div>
      <div id="statusMessage" aria-live="polite">
        <div id="statusCard">
          <div id="statusSpinner" aria-hidden="true"></div>
          <p id="statusTitle"></p>
        </div>
      </div>
    </div>

    <script>
      const fsBtn = document.getElementById("fsBtn");
      const container = document.getElementById("container");
      const body = document.body;
      const player = document.getElementById("player");
      const shoutComposer = document.getElementById("shoutComposer");
      const shoutInput = document.getElementById("shoutInput");
      const soundPopup = document.getElementById("soundPopup");
      const statusMessage = document.getElementById("statusMessage");
      const statusTitle = document.getElementById("statusTitle");
      let soundList = null;
      let filteredSounds = [];
      let selectedSoundIndex = -1;
      let shoutOpen = false;

      // ------- WEBRTC (WHEP) PLAYBACK -------

      const PATH_NAME = "stream";
      const MEDIA_BASE = `${window.location.protocol}//${window.location.hostname}:8889`;
      const WEBRTC_PATHS = [
        `/${PATH_NAME}/whep`, // WHEP (newer)
        `/whep/${PATH_NAME}`, // alternate layout
        `/${PATH_NAME}`, // legacy JSON/SDP endpoint
      ];
      let pc;
      let playbackAttempt = 0;
      let reconnectTimer = null;
      let startupTimer = null;
      let frameWatchdogTimer = null;
      let statusHideTimer = null;
      let lastFrameAt = 0;
      let playbackStarted = false;

      async function waitForIceGatheringComplete(connection) {
        if (connection.iceGatheringState === "complete") return;
        await new Promise((resolve) => {
          const checkState = () => {
            if (connection.iceGatheringState === "complete") {
              connection.removeEventListener("icegatheringstatechange", checkState);
              resolve();
            }
          };
          connection.addEventListener("icegatheringstatechange", checkState);
        });
      }

      async function fetchAnswer(sdp) {
        for (const path of WEBRTC_PATHS) {
          const url = `${MEDIA_BASE}${path}`;
          try {
            const res = await fetch(url, {
              method: "POST",
              headers: { "Content-Type": "application/sdp" },
              body: sdp,
            });
            if (res.ok) {
              return res.text();
            }
            if (res.status === 401 || res.status === 403) {
              throw new Error("Stream access denied");
            }
          } catch (err) {
            if (err && err.message === "Stream access denied") {
              throw err;
            }
            /* try next path */
          }
        }
        throw new Error("All WebRTC endpoints failed");
      }

      function showStatus(message, variant = "waiting") {
        statusTitle.textContent = message;
        statusMessage.classList.toggle("denied", variant === "denied");
        statusMessage.classList.add("visible");
        fsBtn.classList.add("fullscreen-hide");
      }

      function hideStatus() {
        statusMessage.classList.remove("visible");
        if (!document.fullscreenElement) {
          fsBtn.classList.remove("fullscreen-hide");
        }
      }

      function clearPlaybackTimers() {
        if (reconnectTimer) {
          clearTimeout(reconnectTimer);
          reconnectTimer = null;
        }
        if (startupTimer) {
          clearTimeout(startupTimer);
          startupTimer = null;
        }
        if (frameWatchdogTimer) {
          clearTimeout(frameWatchdogTimer);
          frameWatchdogTimer = null;
        }
        if (statusHideTimer) {
          clearTimeout(statusHideTimer);
          statusHideTimer = null;
        }
      }

      function stopPlayback() {
        clearPlaybackTimers();
        if (pc) {
          pc.ontrack = null;
          pc.onconnectionstatechange = null;
          pc.oniceconnectionstatechange = null;
          pc.close();
          pc = null;
        }
        player.pause();
        player.removeAttribute("src");
        player.srcObject = null;
        playbackStarted = false;
        lastFrameAt = 0;
      }

      function scheduleReconnect(reason, delayMs = 1500) {
        if (reconnectTimer) return;
        console.warn(`Scheduling playback retry: ${reason}`);
        showStatus("waiting for connection");
        reconnectTimer = setTimeout(() => {
          reconnectTimer = null;
          launchPlayback();
        }, delayMs);
      }

      function startFrameWatchdog() {
        if (!("requestVideoFrameCallback" in HTMLVideoElement.prototype)) {
          return;
        }
        const watchFrame = () => {
          if (!pc) return;
          player.requestVideoFrameCallback(() => {
            lastFrameAt = Date.now();
            watchFrame();
          });
        };
        lastFrameAt = 0;
        watchFrame();
        frameWatchdogTimer = setTimeout(function checkFrames() {
          if (!pc) return;
          if (!lastFrameAt) {
            stopPlayback();
            scheduleReconnect("no video frames received");
            return;
          }
          if (Date.now() - lastFrameAt > 5000) {
            stopPlayback();
            scheduleReconnect("video frames stalled");
            return;
          }
          frameWatchdogTimer = setTimeout(checkFrames, 3000);
        }, 6000);
      }

      async function startPlayback() {
        stopPlayback();
        playbackAttempt += 1;
        showStatus("waiting for connection");

        pc = new RTCPeerConnection();
        pc.addTransceiver("video", { direction: "recvonly" });
        pc.addTransceiver("audio", { direction: "recvonly" });

        pc.addEventListener("track", (event) => {
          if (event.streams && event.streams[0]) {
            player.srcObject = event.streams[0];
            player.play().catch(() => {});
            playbackStarted = true;
            if (startupTimer) {
              clearTimeout(startupTimer);
              startupTimer = null;
            }
            statusHideTimer = setTimeout(() => {
              statusHideTimer = null;
              hideStatus();
            }, 3000);
          }
        });

        pc.addEventListener("connectionstatechange", () => {
          if (!pc) return;
          const state = pc.connectionState;
          if (state === "failed" || state === "disconnected") {
            stopPlayback();
            scheduleReconnect(`connection state ${state}`);
          }
        });

        pc.addEventListener("iceconnectionstatechange", () => {
          if (!pc) return;
          const state = pc.iceConnectionState;
          if (state === "failed" || state === "disconnected") {
            stopPlayback();
            scheduleReconnect(`ICE state ${state}`);
          }
        });

        startupTimer = setTimeout(() => {
          if (!playbackStarted) {
            stopPlayback();
            scheduleReconnect("startup timeout");
          }
        }, 8000);

        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        await waitForIceGatheringComplete(pc);

        const answer = await fetchAnswer(pc.localDescription.sdp);
        await pc.setRemoteDescription(new RTCSessionDescription({ type: "answer", sdp: answer }));
        startFrameWatchdog();
      }

      function launchPlayback() {
        startPlayback().catch((err) => {
        console.error("WebRTC playback failed", err);
        stopPlayback();
        const denied = err && err.message === "Stream access denied";
        if (denied) {
          showStatus("access denied", "denied");
          return;
        }
        scheduleReconnect(err && err.message ? err.message : "unknown playback error");
        });
      }

      launchPlayback();

      // Keep page focused so key events stay here even after interacting with the player UI
      body.focus();
      player.setAttribute("tabindex", "-1");
      player.addEventListener("pointerup", () => setTimeout(() => body.focus(), 0));
      window.addEventListener("focus", () => body.focus());
      window.addEventListener("blur", () => {
        if (document.activeElement === player) {
          setTimeout(() => body.focus(), 0);
        }
      });

      window.addEventListener("beforeunload", () => {
        stopPlayback();
        sendPresence("leave");
      });

      // ------- SHOUT / OVERLAY MESSAGE -------

      function openShoutComposer() {
        shoutOpen = true;
        shoutInput.value = "";
        shoutComposer.classList.remove("hidden");
        setTimeout(() => shoutInput.focus(), 0);
      }

      function closeShoutComposer() {
        shoutOpen = false;
        shoutComposer.classList.add("hidden");
        soundPopup.classList.add("hidden");
        shoutInput.blur();
        body.focus();
      }

      async function submitShout() {
        const message = shoutInput.value.trim();
        if (!message) {
          closeShoutComposer();
          return;
        }
        try {
          await fetch("/shout", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message }),
          });
        } catch (err) {
          console.warn("Shout send failed", err);
        }
        closeShoutComposer();
      }

      async function loadSoundList() {
        if (soundList) return soundList;
        try {
          const res = await fetch("/soundlist");
          if (!res.ok) return [];
          const data = await res.json();
          soundList = Array.isArray(data.sounds) ? data.sounds : [];
        } catch (_) {
          soundList = [];
        }
        return soundList;
      }

      function normalizeSearchValue(value) {
        return value
          .toLowerCase()
          .replace(/[_-]+/g, " ")
          .replace(/[^a-z0-9 ]+/g, " ")
          .replace(/\s+/g, " ")
          .trim();
      }

      function isSubsequence(needle, haystack) {
        if (!needle) return true;
        let i = 0;
        for (let j = 0; j < haystack.length && i < needle.length; j += 1) {
          if (needle[i] === haystack[j]) i += 1;
        }
        return i === needle.length;
      }

      function scoreSoundMatch(name, query) {
        const normalizedName = normalizeSearchValue(name);
        const normalizedQuery = normalizeSearchValue(query);
        if (!normalizedName || !normalizedQuery) return -1;

        const nameTokens = normalizedName.split(" ").filter(Boolean);
        const queryTokens = normalizedQuery.split(" ").filter(Boolean);
        const compactName = nameTokens.join("");
        const compactQuery = queryTokens.join("");

        for (const token of queryTokens) {
          const tokenMatches =
            nameTokens.some((nameToken) => nameToken.includes(token)) || compactName.includes(token);
          if (!tokenMatches) return -1;
        }

        let score = 0;
        if (normalizedName === normalizedQuery) score += 1000;
        if (normalizedName.startsWith(normalizedQuery)) score += 700;
        if (compactName.startsWith(compactQuery)) score += 650;
        if (compactName.includes(compactQuery)) score += 500;
        if (isSubsequence(compactQuery, compactName)) score += 250;

        for (const token of queryTokens) {
          if (nameTokens.some((nameToken) => nameToken === token)) {
            score += 120;
          } else if (nameTokens.some((nameToken) => nameToken.startsWith(token))) {
            score += 90;
          } else if (nameTokens.some((nameToken) => nameToken.includes(token))) {
            score += 60;
          }
        }

        return score - normalizedName.length * 0.01;
      }

      function renderSoundPopup(items) {
        filteredSounds = items;
        if (!items.length) {
          soundPopup.classList.add("hidden");
          soundPopup.replaceChildren();
          selectedSoundIndex = -1;
          return;
        }
        selectedSoundIndex = Math.min(Math.max(selectedSoundIndex, 0), items.length - 1);
        const fragment = document.createDocumentFragment();
        for (let idx = 0; idx < items.length; idx += 1) {
          const name = items[idx];
          const item = document.createElement("div");
          item.className = "sound-item" + (idx === selectedSoundIndex ? " selected" : "");
          item.dataset.name = name;
          item.textContent = name;
          fragment.appendChild(item);
        }
        soundPopup.replaceChildren(fragment);
        soundPopup.classList.remove("hidden");
      }

      async function updateSoundPopup() {
        const value = shoutInput.value.trim();
        if (!value.startsWith("#")) {
          soundPopup.classList.add("hidden");
          return;
        }
        const all = await loadSoundList();
        if (value === "#" || value === "# ") {
          selectedSoundIndex = 0;
          renderSoundPopup(all);
          return;
        }
        const needle = value.slice(1).toLowerCase();
        const filtered = all
          .map((name) => ({ name, score: scoreSoundMatch(name, needle) }))
          .filter((entry) => entry.score >= 0)
          .sort((a, b) => b.score - a.score || a.name.localeCompare(b.name))
          .map((entry) => entry.name);
        selectedSoundIndex = 0;
        renderSoundPopup(filtered);
      }

      function selectFirstSound() {
        if (!filteredSounds.length) return false;
        const name = filteredSounds[Math.max(selectedSoundIndex, 0)];
        shoutInput.value = `#${name}`;
        return true;
      }

      function moveSoundSelection(delta) {
        if (!filteredSounds.length) return;
        selectedSoundIndex = (selectedSoundIndex + delta + filteredSounds.length) % filteredSounds.length;
        renderSoundPopup(filteredSounds);
        const selected = soundPopup.querySelector(".sound-item.selected");
        if (selected) {
          selected.scrollIntoView({ block: "nearest" });
        }
      }

      function isHashShortcut(event) {
        if (event.key === "#") return true;
        // Fallback for layouts where "#" comes from Shift+3.
        return event.code === "Digit3" && event.shiftKey;
      }

      // ------- INPUT HANDLING (same behavior as before) -------

      function sendPresence(eventType) {
        const payload = JSON.stringify({ event: eventType });
        if (navigator.sendBeacon) {
          const blob = new Blob([payload], { type: "application/json" });
          navigator.sendBeacon("/presence", blob);
        } else {
          fetch("/presence", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: payload,
          }).catch(() => {});
        }
      }

      sendPresence("join");

      async function sendInput(endpoint) {
        try {
          await fetch(endpoint, { method: "POST" });
        } catch (err) {
          console.warn(`Input error for ${endpoint}:`, err);
        }
      }


      // Keyboard handling on window
      window.addEventListener("keydown", (e) => {
        if (shoutOpen) {
          if (e.key === "Escape") {
            e.preventDefault();
            closeShoutComposer();
            return;
          }
          if (e.key === "Enter") {
            e.preventDefault();
            if (shoutInput.value.trim().startsWith("#")) {
              selectFirstSound();
            }
            submitShout();
            return;
          }
          if (e.key === "ArrowDown") {
            e.preventDefault();
            if (shoutInput.value.trim().startsWith("#")) {
              moveSoundSelection(1);
            }
            return;
          }
          if (e.key === "ArrowUp") {
            e.preventDefault();
            if (shoutInput.value.trim().startsWith("#")) {
              moveSoundSelection(-1);
            }
            return;
          }
          if (e.key === "Tab") {
            e.preventDefault();
            if (shoutInput.value.trim().startsWith("#")) {
              moveSoundSelection(e.shiftKey ? -1 : 1);
            }
            return;
          }
          return; // allow typing inside the input
        }

        if (e.key === "Enter") {
          e.preventDefault();
          openShoutComposer();
          return;
        }
        if (isHashShortcut(e)) {
          e.preventDefault();
          openShoutComposer();
          shoutInput.value = "#";
          updateSoundPopup();
          return;
        }
        if (e.key === "Escape") {
          // Keep keyboard controls responsive after leaving fullscreen.
          setTimeout(() => body.focus(), 0);
          return;
        }

        let endpoint = null;

        switch (e.key) {
          case " ":
          case "Spacebar":
            endpoint = "/space";
            break;
          case "ArrowLeft":
            endpoint = "/left";
            break;
          case "ArrowRight":
            endpoint = "/right";
            break;
          case "ArrowUp":
            endpoint = "/up";
            break;
          case "ArrowDown":
            endpoint = "/down";
            break;
        }

        if (!endpoint) return;

        e.preventDefault();
        sendInput(endpoint);
      });

      shoutInput.addEventListener("input", () => {
        updateSoundPopup();
      });

      // ------- FULLSCREEN HANDLING -------

      fsBtn.addEventListener("click", () => {
        if (!document.fullscreenElement) {
          container.requestFullscreen().catch(() => {});
        } else {
          document.exitFullscreen().catch(() => {});
        }
      });

      document.addEventListener("fullscreenchange", () => {
        if (document.fullscreenElement) {
          fsBtn.classList.add("fullscreen-hide");
        } else {
          fsBtn.classList.remove("fullscreen-hide");
          if (shoutOpen) {
            setTimeout(() => shoutInput.focus(), 0);
          } else {
            setTimeout(() => body.focus(), 0);
          }
        }
      });
    </script>
  </body>
</html>
